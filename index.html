<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anatomy Viewer v2.3 (Clean Hash)</title>
    <style>
        body { margin: 0; background: #e5e5e5; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: #333; }
        .panel { position: absolute; background: rgba(255,255,255,0.95); padding: 15px; border-radius: 12px; backdrop-filter: blur(8px); border: 1px solid #ccc; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #camera-panel { top: 20px; left: 20px; width: 220px; }
        #layer-panel { top: 20px; right: 20px; width: 220px; }
        #label { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 1.4rem; font-weight: bold; pointer-events: none; color: #222; }
        .control-group { margin-bottom: 12px; }
        .control-group label { display: block; font-size: 0.75rem; color: #666; margin-bottom: 5px; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; }
        #ui-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; background: rgba(255,255,255,0.8); padding: 15px 25px; border-radius: 50px; border: 1px solid #ccc; }
        .step-btn { width: 40px; height: 40px; border: none; border-radius: 50%; background: #ddd; color: #555; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .step-btn.active { background: #007bff !important; color: white !important; transform: scale(1.1); }
        #version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 0.7rem; color: #999; }
    </style>
</head>
<body>

    <div id="label">Loomis Construction</div>

    <div id="camera-panel" class="panel">
        <div class="control-group">
            <label>LENS (FOV)</label>
            <input type="range" id="fov-slider" min="15" max="90" value="45">
        </div>
        <button id="reset-cam" style="width:100%; background:#007bff; color:white; border:none; padding:8px; border-radius:4px; cursor:pointer; font-weight:bold;">RESET VIEW</button>
    </div>

    <div id="layer-panel" class="panel">
        <div class="control-group">
            <label>CONSTRUCTION OPACITY</label>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
        <div class="control-group" style="display:flex; align-items:center; gap:10px; margin-bottom:0;">
            <input type="checkbox" id="ghost-toggle" checked>
            <label style="margin-bottom:0;">REVEAL PREVIOUS STEP</label>
        </div>
    </div>

    <div id="ui-container"></div>
    <div id="version-tag">v2.3</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        const STAGES = [
            { name: "Loomis Sphere", url: "models/LoomisSphere.glb" },
            { name: "Basic Loomis Head", url: "models/LoomisHead.glb" },
            { name: "Modified Center Line", url: "models/ModifiedCenterLine.glb" },
            { name: "Bony Landmarks", url: "models/BonyLandmarks.glb" }
        ];

        let scene, camera, renderer, controls, currentIdx = 0;
        const loadedModels = [];

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe5e5e5);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit pixel ratio for performance
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbbb, 2.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 5, 5);
            scene.add(sun);

            loadModels();
            generateUI();
            setupControls();
            animate();
        }

        function applyAlphaHash(obj, opacity) {
            obj.traverse(child => {
                if (child.isMesh) {
                    child.material.transparent = false; // Alpha hash doesn't need "standard" transparency
                    child.material.opacity = opacity;
                    
                    // The "Blender Secret"
                    child.material.alphaHash = (opacity < 0.98);
                    
                    // Side rendering: Use FrontSide to reduce noise, DoubleSide only if needed
                    child.material.side = THREE.FrontSide; 
                    child.material.depthWrite = true; 
                }
            });
        }

        function setModelStates() {
            const isGhosting = document.getElementById('ghost-toggle').checked;
            const opacity = parseFloat(document.getElementById('opacity-slider').value);

            loadedModels.forEach((model, i) => {
                if(!model) return;
                if (i === currentIdx) {
                    model.visible = true;
                    applyAlphaHash(model, opacity);
                } else if (isGhosting && i === currentIdx - 1) {
                    model.visible = true;
                    applyAlphaHash(model, 0.1); // Very light ghost
                } else {
                    model.visible = false;
                }
            });
        }

        async function loadModels() {
            const loader = new GLTFLoader();
            const promises = STAGES.map((stage, index) => {
                return new Promise((resolve) => {
                    loader.load(stage.url, (gltf) => {
                        const model = gltf.scene;
                        model.visible = false;
                        scene.add(model);
                        loadedModels[index] = model;
                        resolve();
                    }, undefined, () => resolve());
                });
            });
            await Promise.all(promises);
            switchStep(0);
        }

        function generateUI() {
            const container = document.getElementById('ui-container');
            STAGES.forEach((_, index) => {
                const btn = document.createElement('button');
                btn.innerText = index + 1;
                btn.className = 'step-btn';
                btn.onclick = () => switchStep(index);
                container.appendChild(btn);
            });
        }

        function switchStep(index) {
            currentIdx = index;
            setModelStates();
            document.querySelectorAll('.step-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            document.getElementById('label').innerText = `Step ${index + 1}: ${STAGES[index].name}`;
        }

        function setupControls() {
            document.getElementById('opacity-slider').oninput = () => setModelStates();
            document.getElementById('ghost-toggle').onchange = () => setModelStates();
            document.getElementById('fov-slider').oninput = (e) => { camera.fov = e.target.value; camera.updateProjectionMatrix(); };
            document.getElementById('reset-cam').onclick = () => {
                camera.position.set(0,0,5); camera.fov=45; camera.updateProjectionMatrix();
                document.getElementById('fov-slider').value=45; controls.reset();
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
