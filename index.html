<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anatomy Step-by-Step Viewer</title>
    <style>
        body { margin: 0; background: #222; font-family: sans-serif; overflow: hidden; }
        #ui-container {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 10px;
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 50px;
        }
        .step-btn {
            padding: 10px 20px; border: none; border-radius: 20px;
            background: #444; color: white; cursor: pointer; transition: 0.3s;
        }
        .step-btn.active { background: #007bff; box-shadow: 0 0 15px #007bff; }
        .step-btn:hover { background: #666; }
        #label { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="label">Step 1: Primary Forms</div>
    <div id="ui-container" id="buttons"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // ==========================================
        // CONFIGURATION: ONLY EDIT THIS PART
        // ==========================================
        const STAGES = [
            { name: "Loomis Sphere", url: "models/LoomisSphere.glb" },
            { name: "Basic Loomis Head", url: "models/LoomisHead.glb" },
            { name: "Modified Centerline", url: "models/ModifiedCenterLine.glb" },
            { name: "Bony Landmarks", url: "models/BonyLandmarks.glb" }
        ];
        // ==========================================

        let scene, camera, renderer, controls;
        const loadedModels = [];

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            
            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(2, 2, 5);
            scene.add(light, new THREE.AmbientLight(0x404040, 2));

            loadAllModels();
            generateUI();
            animate();
        }

        function loadAllModels() {
            const loader = new GLTFLoader();
            STAGES.forEach((stage, index) => {
                loader.load(stage.url, (gltf) => {
                    const model = gltf.scene;
                    model.visible = (index === 0); // Only show first model initially
                    scene.add(model);
                    loadedModels[index] = model;
                });
            });
        }

        function generateUI() {
            const container = document.getElementById('ui-container');
            STAGES.forEach((stage, index) => {
                const btn = document.createElement('button');
                btn.innerText = index + 1;
                btn.className = `step-btn ${index === 0 ? 'active' : ''}`;
                btn.onclick = () => switchStep(index);
                container.appendChild(btn);
            });
        }

        function switchStep(index) {
            loadedModels.forEach((m, i) => {
                if(m) m.visible = (i === index);
            });

            // Update UI State
            document.querySelectorAll('.step-btn').forEach((b, i) => {
                b.classList.toggle('active', i === index);
            });
            document.getElementById('label').innerText = `Step ${index + 1}: ${STAGES[index].name}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
