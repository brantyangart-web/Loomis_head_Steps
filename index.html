<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anatomy Step-by-Step Viewer v1.2</title>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        
        /* UI Panels */
        .panel { position: absolute; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; backdrop-filter: blur(8px); border: 1px solid #444; }
        #camera-panel { top: 20px; left: 20px; width: 220px; }
        #ghost-panel { top: 20px; right: 20px; }
        #label { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 1.4rem; font-weight: bold; pointer-events: none; }
        
        /* Controls */
        .control-group { margin-bottom: 15px; }
        .control-group label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        #ui-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; background: rgba(0,0,0,0.7); padding: 15px 25px; border-radius: 50px;
        }

        .step-btn {
            width: 40px; height: 40px; border: none; border-radius: 50%;
            background: #333; color: #aaa; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .step-btn.active { background: #007bff; color: white; box-shadow: 0 0 15px #007bff; transform: scale(1.1); }
        
        #version-tag { position: absolute; bottom: 10px; right: 15px; font-size: 0.7rem; color: #666; }
        #spinner {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #007bff;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="spinner"></div>
    <div id="label">Loading Models...</div>

    <div id="camera-panel" class="panel">
        <div class="control-group">
            <label>Lens (Focal Length / FOV)</label>
            <input type="range" id="fov-slider" min="15" max="90" value="45">
        </div>
        <div class="control-group">
            <label>Camera Roll (Tilt)</label>
            <input type="range" id="roll-slider" min="-3.14" max="3.14" step="0.01" value="0">
        </div>
        <button id="reset-cam" style="width:100%; background:#444; color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">Reset View</button>
    </div>

    <div id="ghost-panel" class="panel">
        <input type="checkbox" id="ghost-toggle"> <label for="ghost-toggle">Ghost Previous Step</label>
    </div>

    <div id="ui-container"></div>
    <div id="version-tag">v1.2</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // ==========================================
        // CONFIGURATION
        // ==========================================
        const STAGES = [
            { name: "Loomis Sphere", url: "models/LoomisSphere.glb" },
            { name: "Basic Loomis Head", url: "models/LoomisHead.glb" },
            { name: "Modified Center Line", url: "models/ModifiedCenterLine.glb" }
        ];
        const GHOST_OPACITY = 0.15;
        // ==========================================

        let scene, camera, renderer, controls, currentIdx = 0;
        const loadedModels = [];
        const spinner = document.getElementById('spinner');

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 3));
            const sun = new THREE.DirectionalLight(0xffffff, 2);
            sun.position.set(5, 5, 5);
            scene.add(sun);

            loadModels();
            generateUI();
            setupCameraUI();
            animate();
        }

        function setupCameraUI() {
            const fovSlider = document.getElementById('fov-slider');
            const rollSlider = document.getElementById('roll-slider');
            const resetBtn = document.getElementById('reset-cam');

            fovSlider.addEventListener('input', (e) => {
                camera.fov = e.target.value;
                camera.updateProjectionMatrix();
            });

            rollSlider.addEventListener('input', (e) => {
                // Adjusting the "up" vector to roll the camera
                const roll = parseFloat(e.target.value);
                camera.up.set(Math.sin(roll), Math.cos(roll), 0);
            });

            resetBtn.onclick = () => {
                camera.position.set(0, 0, 5);
                camera.up.set(0, 1, 0);
                camera.fov = 45;
                camera.updateProjectionMatrix();
                fovSlider.value = 45;
                rollSlider.value = 0;
                controls.reset();
            };
        }

        async function loadModels() {
            spinner.style.display = 'block';
            const loader = new GLTFLoader();
            const promises = STAGES.map((stage, index) => {
                return new Promise((resolve) => {
                    loader.load(stage.url, (gltf) => {
                        const model = gltf.scene;
                        model.visible = (index === 0);
                        scene.add(model);
                        loadedModels[index] = model;
                        resolve();
                    }, undefined, () => resolve());
                });
            });

            await Promise.all(promises);
            spinner.style.display = 'none';
            switchStep(0);
        }

        function generateUI() {
            const container = document.getElementById('ui-container');
            STAGES.forEach((_, index) => {
                const btn = document.createElement('button');
                btn.innerText = index + 1;
                btn.className = `step-btn ${index === 0 ? 'active' : ''}`;
                btn.onclick = () => switchStep(index);
                container.appendChild(btn);
            });
        }

        function switchStep(index) {
            currentIdx = index;
            const isGhosting = document.getElementById('ghost-toggle').checked;
            loadedModels.forEach((model, i) => {
                if(!model) return;
                if (i === index) {
                    model.visible = true;
                    setOpacity(model, 1.0);
                } else if (isGhosting && i === index - 1) {
                    model.visible = true;
                    setOpacity(model, GHOST_OPACITY);
                } else {
                    model.visible = false;
                }
            });
            document.querySelectorAll('.step-btn').forEach((b, i) => b.classList.toggle('active', i === index));
            document.getElementById('label').innerText = `Step ${index + 1}: ${STAGES[index].name}`;
        }

        function setOpacity(obj, opacity) {
            obj.traverse(child => {
                if (child.isMesh) {
                    child.material.transparent = opacity < 1;
                    child.material.opacity = opacity;
                }
            });
        }

        document.getElementById('ghost-toggle').onchange = () => switchStep(currentIdx);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
